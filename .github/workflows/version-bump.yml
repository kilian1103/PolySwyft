name: Version Bump

on:
  push:
    branches: [master]

permissions:
  contents: write
  actions: write

jobs:
  bump:
    # Skip if the push was the version-bump commit itself
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest

    steps:
      - name: Check for POLYSWYFT_REPOSITORY_VERSION_BUMPER
        env:
          PAT: ${{ secrets.POLYSWYFT_REPOSITORY_VERSION_BUMPER }}
        run: |
          if [ -z "$PAT" ]; then
            echo "::error::POLYSWYFT_REPOSITORY_VERSION_BUMPER secret is not set. A Personal Access Token is required to push to the protected master branch."
            echo "Create a fine-grained PAT with 'Contents: Read and write' permission, add it as a repository secret named POLYSWYFT_REPOSITORY_VERSION_BUMPER."
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.POLYSWYFT_REPOSITORY_VERSION_BUMPER }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Determine version bump type
        id: bump_type
        run: |
          # Get full commit messages since last tag (including bodies/footers)
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$LAST_TAG" ]; then
            COMMITS=$(git log --format=%B)
          else
            COMMITS=$(git log "$LAST_TAG"..HEAD --format=%B)
          fi

          echo "Commits since last tag:"
          echo "$COMMITS"

          if printf '%s\n' "$COMMITS" | grep -qiE 'BREAKING CHANGE:|^[a-z]+(\([^)]+\))?!:'; then
            echo "bump=major" >> "$GITHUB_OUTPUT"
            echo "Bump type: major"
          elif printf '%s\n' "$COMMITS" | grep -qiE '^feat(\([^)]+\))?:'; then
            echo "bump=minor" >> "$GITHUB_OUTPUT"
            echo "Bump type: minor"
          else
            echo "bump=patch" >> "$GITHUB_OUTPUT"
            echo "Bump type: patch"
          fi

      - name: Bump version
        id: new_version
        run: |
          # Read current version from pyproject.toml
          CURRENT=$(python -c "
          import re
          with open('pyproject.toml') as f:
              m = re.search(r'version\s*=\s*\"(\d+\.\d+\.\d+)\"', f.read())
              print(m.group(1))
          ")
          echo "Current version: $CURRENT"

          # Compute new version
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          BUMP="${{ steps.bump_type.outputs.bump }}"
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW="${MAJOR}.${MINOR}.${PATCH}"
          echo "New version: $NEW"
          echo "version=$NEW" >> "$GITHUB_OUTPUT"

          # Update pyproject.toml
          sed -i "s/^version = \"$CURRENT\"/version = \"$NEW\"/" pyproject.toml

          # Update polyswyft/__init__.py
          sed -i "s/__version__ = \"$CURRENT\"/__version__ = \"$NEW\"/" polyswyft/__init__.py

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --tag "v${{ steps.new_version.outputs.version }}" --output CHANGELOG.md

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pyproject.toml polyswyft/__init__.py CHANGELOG.md
          git commit -m "chore: bump version to ${{ steps.new_version.outputs.version }} [skip ci]"
          git tag -f "v${{ steps.new_version.outputs.version }}"
          git push origin master
          git push origin "v${{ steps.new_version.outputs.version }}"

      - name: Dispatch publish workflow
        env:
          GH_TOKEN: ${{ secrets.POLYSWYFT_REPOSITORY_VERSION_BUMPER }}
        run: |
          gh workflow run publish.yml \
            --ref "v${{ steps.new_version.outputs.version }}" \
            --field tag="v${{ steps.new_version.outputs.version }}"
